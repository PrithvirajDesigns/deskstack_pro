<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deskstack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --paper: #F3F1EC;
            --paper-raised: #FFFFFF;
            --ink: #17181A;
            --ink-soft: #6B6659;
            --line: #E1DDD2;
            --line-strong: #CFC9BA;
            --accent: #C97A2B;
            --accent-soft: #F0DCC2;
            --blue: #2B3A4A;
            --moss: #4F6B4C;
            --danger: #B3462C;
            --radius: 10px;
            --font-display: 'Manrope', sans-serif;
            --font-body: 'Manrope', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--paper);
            background-image: radial-gradient(var(--line-strong) 1.2px, transparent 1.2px);
            background-size: 22px 22px;
            background-attachment: fixed;
            color: var(--ink);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: var(--font-display);
            margin: 0;
            letter-spacing: -0.01em;
        }

        p {
            margin: 0;
        }

        button {
            font-family: inherit;
            cursor: pointer;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        ::selection {
            background: var(--accent-soft);
        }

        .mono {
            font-family: var(--font-mono);
        }

        button:focus-visible,
        input:focus-visible,
        textarea:focus-visible,
        [tabindex]:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }

        /* ---------- layout shell ---------- */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            background: rgba(243, 241, 236, 0.88);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--line);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 19px;
            color: var(--ink);
            white-space: nowrap;
        }

        .logo .mark {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            background: var(--ink);
            color: var(--paper);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        .search-wrap {
            flex: 1;
            max-width: 480px;
            position: relative;
        }

        .search-wrap input {
            width: 100%;
            padding: 9px 12px 9px 36px;
            border-radius: 20px;
            border: 1px solid var(--line-strong);
            background: var(--paper-raised);
            font-size: 14px;
            color: var(--ink);
        }

        .search-wrap svg {
            position: absolute;
            left: 11px;
            top: 9px;
            color: var(--ink-soft);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid transparent;
            font-size: 13.5px;
            font-weight: 600;
            background: transparent;
            color: var(--ink);
            transition: background .15s, border-color .15s, color .15s;
        }

        .btn-primary {
            background: var(--ink);
            color: var(--paper);
        }

        .btn-primary:hover {
            background: var(--accent);
        }

        .btn-outline {
            border-color: var(--line-strong);
            background: var(--paper-raised);
        }

        .btn-outline:hover {
            border-color: var(--ink);
        }

        .btn-ghost:hover {
            background: var(--line);
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12.5px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            font-family: var(--font-display);
            flex-shrink: 0;
        }

        .avatar.sm {
            width: 24px;
            height: 24px;
            font-size: 11px;
        }

        .avatar.lg {
            width: 64px;
            height: 64px;
            font-size: 22px;
        }

        .shell {
            display: flex;
            align-items: flex-start;
            max-width: 1360px;
            margin: 0 auto;
            padding-top: 65px;
        }

        .sidebar {
            width: 230px;
            flex-shrink: 0;
            position: sticky;
            top: 65px;
            height: calc(100vh - 65px);
            overflow-y: auto;
            padding: 20px 12px 40px;
        }

        .side-section {
            margin-bottom: 22px;
        }

        .side-label {
            font-family: var(--font-mono);
            font-size: 10.5px;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--ink-soft);
            padding: 0 10px 8px;
        }

        .side-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 2px;
        }

        .side-link:hover {
            background: var(--line);
        }

        .side-link.active {
            background: var(--paper-raised);
            box-shadow: inset 0 0 0 1px var(--line-strong);
            font-weight: 600;
        }

        .side-link svg {
            flex-shrink: 0;
            color: var(--ink-soft);
        }

        .side-link.active svg {
            color: var(--accent);
        }

        .tag-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 11px;
            margin: 0 6px 6px 0;
            border-radius: 20px;
            background: var(--paper-raised);
            border: 1px solid var(--line-strong);
            font-size: 12.5px;
            font-weight: 500;
            color: var(--ink);
        }

        .tag-pill:hover {
            border-color: var(--ink);
            background: var(--line);
        }

        .tag-pill .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            padding: 0 8px;
        }

        .people-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .people-row:hover {
            background: var(--line);
        }

        .people-row span.h {
            color: var(--ink-soft);
            font-weight: 400;
            font-size: 11.5px;
        }

        .community-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 500;
        }

        .community-row:hover {
            background: var(--line);
        }

        .community-row .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .community-row .cname {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .pin-btn {
            background: none;
            border: none;
            padding: 3px;
            border-radius: 5px;
            color: var(--line-strong);
            flex-shrink: 0;
        }

        .pin-btn:hover {
            background: var(--paper-raised);
            color: var(--ink-soft);
        }

        .pin-btn.pinned {
            color: var(--accent);
        }

        .side-empty {
            padding: 4px 10px;
            font-size: 12.5px;
            color: var(--ink-soft);
        }

        main {
            flex: 1;
            min-width: 0;
            padding: 22px 22px 80px;
        }

        .page-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 18px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
        }

        .page-sub {
            color: var(--ink-soft);
            font-size: 14px;
            margin-top: 4px;
        }

        /* ---------- masonry feed ---------- */
        .feed {
            column-count: 4;
            column-gap: 16px;
        }

        @media (max-width:1240px) {
            .feed {
                column-count: 3;
            }
        }

        @media (max-width:860px) {
            .feed {
                column-count: 2;
            }

            .sidebar {
                display: none;
            }
        }

        @media (max-width:560px) {
            .feed {
                column-count: 1;
            }
        }

        .card {
            break-inside: avoid;
            margin-bottom: 16px;
            border-radius: var(--radius);
            background: var(--paper-raised);
            border: 1px solid var(--line);
            overflow: hidden;
            cursor: pointer;
            transition: transform .15s, box-shadow .15s, border-color .15s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px -14px rgba(23, 24, 26, .35);
            border-color: var(--line-strong);
        }

        .card-media {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            color: rgba(255, 255, 255, .92);
        }

        .card-media img,
        .card-media video {
            width: 100%;
            display: block;
        }

        .card-media .icon-big {
            opacity: .5;
        }

        .save-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(23, 24, 26, .55);
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s, transform .1s;
        }

        .save-btn:hover {
            background: rgba(23, 24, 26, .8);
            transform: scale(1.06);
        }

        .save-btn.saved {
            background: var(--accent);
            color: #fff;
        }

        .play-badge {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(23, 24, 26, .5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .price-tag {
            position: absolute;
            left: 8px;
            bottom: 8px;
            background: var(--ink);
            color: var(--paper);
            font-family: var(--font-mono);
            font-size: 11.5px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 5px;
            letter-spacing: .02em;
        }

        .card-body {
            padding: 11px 12px 12px;
        }

        .card-title {
            font-size: 14.5px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 8px;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12.5px;
            color: var(--ink-soft);
        }

        .card-meta .handle {
            font-weight: 600;
            color: var(--ink);
        }

        .like-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
            color: var(--ink-soft);
            background: none;
            border: none;
            font-size: 12.5px;
        }

        .like-btn.liked {
            color: var(--danger);
        }

        .like-btn.liked svg {
            fill: var(--danger);
        }

        /* ---------- explore tiles ---------- */
        .tile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 14px;
        }

        .tile {
            border-radius: var(--radius);
            padding: 18px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #fff;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--line);
        }

        .tile h3 {
            font-size: 16px;
        }

        .tile .count {
            font-family: var(--font-mono);
            font-size: 11px;
            opacity: .85;
        }

        /* ---------- item detail ---------- */
        .detail {
            display: flex;
            gap: 26px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .detail-media {
            flex: 1 1 420px;
            min-width: 300px;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 340px;
            position: relative;
        }

        .detail-media img,
        .detail-media video {
            width: 100%;
            display: block;
            max-height: 560px;
            object-fit: cover;
        }

        .ig-link {
            position: absolute;
            left: 12px;
            bottom: 12px;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: 20px;
            background: rgba(23, 24, 26, 0.72);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 12.5px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: background .15s, transform .15s;
        }

        .ig-link:hover {
            background: var(--accent);
            transform: translateY(-1px);
        }

        .detail-info {
            flex: 1 1 340px;
            min-width: 300px;
        }

        .detail-info .price {
            font-family: var(--font-mono);
            font-size: 20px;
            font-weight: 600;
            color: var(--accent);
            margin: 6px 0 14px;
        }

        .detail-actions {
            display: flex;
            gap: 10px;
            margin: 16px 0;
        }

        .author-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0;
            padding: 12px;
            background: var(--paper-raised);
            border: 1px solid var(--line);
            border-radius: 10px;
        }

        .author-row .names {
            flex: 1;
            min-width: 0;
        }

        .author-row .name {
            font-weight: 600;
            font-size: 14px;
        }

        .author-row .handle {
            font-size: 12.5px;
            color: var(--ink-soft);
        }

        .desc {
            font-size: 14.5px;
            line-height: 1.6;
            color: var(--ink);
            margin: 14px 0;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13.5px;
            font-weight: 600;
            color: var(--ink-soft);
            margin-bottom: 16px;
        }

        .back-link:hover {
            color: var(--ink);
        }

        /* comments / forum */
        .divider {
            height: 1px;
            background: var(--line);
            margin: 26px 0;
        }

        .section-label {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .comment {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .comment .bubble {
            flex: 1;
            background: var(--paper-raised);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
        }

        .comment .cname {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .comment .ctext {
            font-size: 13.5px;
            line-height: 1.5;
            color: var(--ink);
        }

        .composer {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-top: 6px;
        }

        .composer-field {
            flex: 1;
            position: relative;
        }

        .composer textarea {
            width: 100%;
            resize: none;
            border: 1px solid var(--line-strong);
            border-radius: 10px;
            padding: 10px 84px 10px 12px;
            font-family: inherit;
            font-size: 13.5px;
            min-height: 44px;
            background: var(--paper-raised);
            color: var(--ink);
        }

        .composer-field .send-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
        }

        .comment-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
        }

        .reply-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--ink-soft);
            font-size: 12px;
            font-weight: 600;
            padding: 2px 4px;
        }

        .reply-link:hover {
            color: var(--ink);
        }

        .replies {
            margin-top: 10px;
            padding-left: 14px;
            border-left: 2px solid var(--line);
        }

        .replies .comment {
            margin-bottom: 10px;
        }

        .reply-form {
            display: none;
            margin-top: 8px;
            gap: 8px;
            align-items: flex-start;
        }

        .reply-form.open {
            display: flex;
        }

        .reply-field {
            flex: 1;
            position: relative;
        }

        .reply-form textarea {
            width: 100%;
            resize: none;
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            padding: 7px 34px 7px 10px;
            font-family: inherit;
            font-size: 13px;
            min-height: 36px;
            background: var(--paper);
        }

        .reply-field .send-btn {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            padding: 3px 6px;
        }

        .tag-search {
            position: relative;
            margin-bottom: 10px;
        }

        .tag-search svg {
            position: absolute;
            left: 10px;
            top: 9px;
            color: var(--ink-soft);
        }

        .tag-search input {
            width: 100%;
            padding: 8px 10px 8px 32px;
            border-radius: 8px;
            border: 1px solid var(--line-strong);
            font-family: inherit;
            font-size: 13.5px;
            background: var(--paper);
        }

        .community-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        /* ---------- forms / modal ---------- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(23, 24, 26, .5);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .modal {
            background: var(--paper-raised);
            border-radius: 14px;
            width: 100%;
            max-width: 480px;
            max-height: 88vh;
            overflow-y: auto;
            padding: 22px;
            border: 1px solid var(--line);
        }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .modal-head h2 {
            font-size: 18px;
        }

        .close-x {
            background: none;
            border: none;
            color: var(--ink-soft);
            padding: 4px;
            border-radius: 6px;
        }

        .close-x:hover {
            background: var(--line);
            color: var(--ink);
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--ink-soft);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .03em;
            font-family: var(--font-mono);
        }

        .field input[type=text],
        .field input[type=number],
        .field textarea,
        .field select {
            width: 100%;
            padding: 9px 11px;
            border-radius: 8px;
            border: 1px solid var(--line-strong);
            font-family: inherit;
            font-size: 14px;
            background: var(--paper);
            color: var(--ink);
        }

        .field textarea {
            resize: vertical;
            min-height: 64px;
        }

        .chip-select {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            padding: 6px 11px;
            border-radius: 20px;
            border: 1px solid var(--line-strong);
            font-size: 12.5px;
            font-weight: 500;
            background: var(--paper);
        }

        .chip.on {
            background: var(--ink);
            color: var(--paper);
            border-color: var(--ink);
        }

        .dropzone {
            border: 2px dashed var(--line-strong);
            border-radius: 12px;
            padding: 26px 16px;
            text-align: center;
            color: var(--ink-soft);
            font-size: 13.5px;
            cursor: pointer;
            background: var(--paper);
            transition: border-color .15s, background .15s;
        }

        .dropzone:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .dropzone svg {
            margin-bottom: 6px;
        }

        .preview-media {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
            max-height: 220px;
            display: flex;
            justify-content: center;
            background: var(--paper);
        }

        .preview-media img,
        .preview-media video {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
        }

        .board-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 6px;
            border-radius: 8px;
        }

        .board-row:hover {
            background: var(--line);
        }

        .board-row input {
            width: 16px;
            height: 16px;
        }

        .board-thumb {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .board-card {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--line);
            background: var(--paper-raised);
            cursor: pointer;
        }

        .board-card:hover {
            border-color: var(--line-strong);
        }

        .board-cover {
            height: 120px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
        }

        .board-cover>div {
            background-size: cover;
        }

        .board-card-body {
            padding: 10px 12px;
        }

        .board-card-body h3 {
            font-size: 14.5px;
        }

        .board-card-body span {
            font-size: 12px;
            color: var(--ink-soft);
            font-family: var(--font-mono);
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--ink-soft);
        }

        .empty svg {
            margin-bottom: 12px;
            opacity: .6;
        }

        .empty h3 {
            color: var(--ink);
            margin-bottom: 6px;
            font-size: 16px;
        }

        .profile-head {
            display: flex;
            gap: 18px;

            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .profile-stats {

        }

        .tabs {

        }

        .tab {

        }

        .tab.active {

        }

            else if (route.view === 'tag') html = viewTag(route.params.id);
            else if (route.view === 'following') html = viewFollowing();
            else if (route.view === 'collections') html = viewCollections();
            else if (route.view === 'board') html = viewBoard(route.params.id);
            else if (route.view === 'item') html = viewItem(route.params.id);
            else if (route.view === 'profile') html = viewProfile(route.params.id);
            else if (route.view === 'search') html = viewSearch(route.params.q);
            document.getElementById('main').innerHTML = html;
            bindDynamic();
        }
        function render() { renderApp(); }

        /* ============================ CARD / MEDIA HELPERS ============================ */
        function mediaBlock(item, tall) {
            const color = catColor(item.category);
            const saved = !!SAVED_MAP[item.id];
            const h = tall ? 'min-height:170px;' : `min-height:${120 + (item.title.length % 5) * 18}px;`;
            let inner;
            console.log(item.media);

            if (item.media) {
                inner = item.type === 'video'
                    ? `<video src="${item.media}" muted loop autoplay playsinline style="width:100%; display:block;"></video>`
                    : `<img src="${item.media}" alt="">`;
            } else {
                inner = `<div class="icon-big">${icon(item.type === 'video' ? 'film' : 'image')}</div>`;
                if (item.type === 'video') {
                    inner += `<div class="play-badge">${icon('play')}</div>`;
                }
            }
            return `
    <div class="card-media" style="background:${color}; ${h}">
      ${inner}
      <button class="save-btn ${saved ? 'saved' : ''}" data-action="save-item" data-id="${item.id}" title="Save to collection" aria-label="Save">
        ${icon(saved ? 'bookmarkFill' : 'bookmark')}
      </button>
      <span class="price-tag mono">$${item.price}</span>
    </div>`;
        }

        function cardHTML(item) {
            const a = uById(item.authorId);
            return `
  <article class="card" data-action="go" data-view="item" data-id="${item.id}">
    ${mediaBlock(item)}
    <div class="card-body">
      <div class="card-title">${item.title}</div>
      <div class="card-meta">
        <span class="avatar sm" style="background:${a.color}">${a.name[0]}</span>
        <span class="handle">@${a.handle}</span>
        <button class="like-btn ${item.likedByMe ? 'liked' : ''}" data-action="like" data-id="${item.id}">${icon('heart')}${item.likes}</button>
      </div>
    </div>
  </article>`;
        }

        function feedGrid(items) {
            if (!items.length) {
                return emptyState('No items yet', 'Nothing here yet — be the first to upload something.', 'image');
            }
            return `<div class="feed">${items.map(cardHTML).join('')}</div>`;
        }

        function emptyState(title, sub, iconName = 'compass') {
            return `<div class="empty">${icon(iconName)}<h3>${title}</h3><p>${sub}</p></div>`;
        }

        /* ============================ VIEWS ============================ */
        function viewFeed() {
            const items = [...ITEMS].sort((a, b) => b.id.localeCompare(a.id));
            return `
    <div class="page-head">
      <div><div class="page-title">For you</div><div class="page-sub">Fresh finds from the community — save what you love, discuss what you're curious about.</div></div>
    </div>
    ${feedGrid(items)}
  `;
        }

        function viewExplore() {
            return `
    <div class="page-head"><div><div class="page-title">Explore communities</div><div class="page-sub">Browse by category. Every tag is a forum too — jump in and talk shop.</div></div></div>
    <div class="tile-grid">
      ${CATEGORIES.map(c => {
                const count = ITEMS.filter(i => i.tags.includes(c.name)).length;
                return `<div class="tile" style="background:${c.color}" data-action="go" data-view="tag" data-id="${c.name}">
          <h3>${c.name}</h3>
          <span class="count mono">${count} item${count === 1 ? '' : 's'}</span>
        </div>`;
            }).join('')}
    </div>
  `;
        }

        function viewTag(tag) {
            const items = ITEMS.filter(i => i.tags.includes(tag));
            const posts = COMMUNITY_POSTS[tag] || [];
            const color = catColor(tag);
            const following = FOLLOWED_TAGS.has(tag);
            const pinned = PINNED_TAGS.has(tag);
            return `
    <div style="background:${color}; border-radius:14px; padding:22px 24px; color:#fff; margin-bottom:20px;">
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap;">
        <div>
          <div class="page-title" style="color:#fff;">${tag}</div>
          <div class="page-sub" style="color:rgba(255,255,255,.85);">${items.length} items curated · ${posts.length} discussion${posts.length === 1 ? '' : 's'}</div>
        </div>
        <div class="community-actions">
          <button class="btn ${following ? 'btn-outline' : 'btn-primary'} btn-sm" style="${following ? '' : 'background:#fff; color:' + color + ';'}" data-action="toggle-community" data-id="${tag}">${following ? 'Following' : 'Follow'}</button>
          ${following ? `<button class="btn btn-outline btn-sm" data-action="toggle-pin" data-id="${tag}" style="background:rgba(255,255,255,.15); border-color:rgba(255,255,255,.5); color:#fff;">${icon(pinned ? 'pinFill' : 'pin')}${pinned ? 'Pinned' : 'Pin'}</button>` : ''}
        </div>
      </div>
    </div>
    <div class="section-label">${icon('grid')}Items</div>
    ${feedGrid(items)}
    <div class="divider"></div>
    <div class="section-label">${icon('comment')}Community discussion</div>
    <form class="composer" data-form="new-post" data-tag="${tag}" style="margin-bottom:20px;">
      <span class="avatar sm" style="background:${uById('you').color}">Y</span>
      <div class="composer-field">
        <textarea name="text" placeholder="Start a discussion about ${tag}..." rows="2"></textarea>
        <button class="btn btn-outline btn-sm send-btn" type="submit">${icon('send')}Post</button>
      </div>
    </form>
    ${posts.length ? posts.map(postHTML).join('') : emptyState('No discussions yet', `Ask a question or share a tip about ${tag.toLowerCase()}.`, 'comment')}
  `;
        }

        function postHTML(p) {
            const a = uById(p.authorId);
            return `
  <div class="comment" style="margin-bottom:22px;">
    <span class="avatar sm" style="background:${a.color}">${a.name[0]}</span>
    <div class="bubble">
      <div class="cname">${a.name} <span style="color:var(--ink-soft); font-weight:400;">@${a.handle}</span></div>
      ${p.title ? `<div style="font-weight:600; margin:4px 0 2px;">${p.title}</div>` : ''}
      <div class="ctext">${p.text}</div>
      ${p.replies.length ? `<div style="margin-top:10px; padding-top:10px; border-top:1px solid var(--line);">
        ${p.replies.map(r => { const ra = uById(r.authorId); return `<div style="display:flex; gap:8px; margin-bottom:8px;"><span class="avatar sm" style="background:${ra.color}">${ra.name[0]}</span><div class="ctext"><b>${ra.name}</b> — ${r.text}</div></div>`; }).join('')}
      </div>` : ''}
    </div>
  </div>`;
        }

        function viewFollowing() {
            const items = ITEMS.filter(i => FOLLOWING.has(i.authorId)).sort((a, b) => b.id.localeCompare(a.id));
            return `
    <div class="page-head"><div><div class="page-title">Following</div><div class="page-sub">Items from the ${FOLLOWING.size} maker${FOLLOWING.size === 1 ? '' : 's'} you follow.</div></div></div>
    ${FOLLOWING.size === 0 ? emptyState("You aren't following anyone yet", 'Visit a profile and hit Follow to see their uploads here.', 'users') : feedGrid(items)}
  `;
        }

        function viewCollections() {
            const mine = BOARDS.filter(b => b.ownerId === 'you');
            return `
    <div class="page-head">
      <div><div class="page-title">Your collections</div><div class="page-sub">Boards you've curated, Pinterest-style.</div></div>
      <button class="btn btn-outline" data-action="new-board">${icon('plus')}New collection</button>
    </div>
    ${mine.length ? `<div class="board-grid">${mine.map(boardCard).join('')}</div>` : emptyState('No collections yet', 'Create a board and start saving items you love.', 'layers')}
  `;
        }

        function boardCard(b) {
            const items = b.itemIds.map(id => ITEMS.find(i => i.id === id)).filter(Boolean).slice(0, 4);
            const cover = items.length ? items.map(i => `<div style="background:${catColor(i.category)}"></div>`).join('') : `<div style="background:var(--line); grid-column:1/-1;"></div>`;
            return `
  <div class="board-card" data-action="go" data-view="board" data-id="${b.id}">
    <div class="board-cover">${cover}</div>
    <div class="board-card-body">
      <h3>${b.name}</h3>
      <span>${b.itemIds.length} item${b.itemIds.length === 1 ? '' : 's'}</span>
    </div>
  </div>`;
        }

        function viewBoard(id) {
            const b = BOARDS.find(x => x.id === id);
            if (!b) return emptyState('Collection not found', '');
            const items = b.itemIds.map(x => ITEMS.find(i => i.id === x)).filter(Boolean);
            return `
    <a href="#" class="back-link" data-action="go" data-view="collections">${icon('chevLeft')}All collections</a>
    <div class="page-head"><div><div class="page-title">${b.name}</div><div class="page-sub">Curated by @${uById(b.ownerId).handle} · ${items.length} items</div></div></div>
    ${feedGrid(items)}
  `;
        }

        function viewItem(id) {
            const item = ITEMS.find(i => i.id === id);
            if (!item) return emptyState('Item not found', '');
            const a = uById(item.authorId);
            const color = catColor(item.category);
            const saved = !!SAVED_MAP[item.id];
            const mediaInner = item.media
                ? (item.type === 'video' ? `<video src="${item.media}" controls style="width:100%;"></video>` : `<img src="${item.media}" alt="">`)
                : `<div style="opacity:.55;">${icon(item.type === 'video' ? 'film' : 'image')}</div>`;
            const igUrl = item.link || `https://instagram.com/${a.handle}`;
            const igBtn = `<a href="${igUrl}" target="_blank" rel="noopener noreferrer" class="ig-link">${icon('instagram')}View on Instagram</a>`;
            return `
    <a href="#" class="back-link" data-action="go" data-view="feed">${icon('chevLeft')}Back to feed</a>
    <div class="detail">
      <div class="detail-media" style="background:${color};">${mediaInner}${igBtn}</div>
      <div class="detail-info">
        <div class="tag-cloud">${item.tags.map(t => `<a href="#" class="tag-pill" data-action="go" data-view="tag" data-id="${t}"><span class="dot" style="background:${catColor(t)}"></span>${t}</a>`).join('')}</div>
        <h1 style="font-size:24px; margin-top:10px;">${item.title}</h1>
        <div class="price mono">$${item.price}</div>
        <div class="detail-actions">
          <button class="btn btn-primary" data-action="shop" data-id="${item.id}">Shop this item</button>
          <button class="btn btn-outline" data-action="save-item" data-id="${item.id}">${icon(saved ? 'bookmarkFill' : 'bookmark')} ${saved ? 'Saved' : 'Save'}</button>
          <button class="btn btn-outline like-btn ${item.likedByMe ? 'liked' : ''}" style="margin-left:0;" data-action="like" data-id="${item.id}">${icon('heart')} ${item.likes}</button>
        </div>
        <div class="author-row">
          <button class="avatar" style="background:${a.color}" data-action="go" data-view="profile" data-id="${a.id}">${a.name[0]}</button>
          <div class="names">
            <div class="name">${a.name}</div>
            <div class="handle">@${a.handle}</div>
          </div>
          ${a.id !== 'you' ? followBtn(a.id) : ''}
        </div>
        <p class="desc">Curated by @${a.handle} for the ${item.category} community. Tap a tag to see what else people are pairing this with, or jump into the discussion below.</p>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section-label">${icon('comment')}Discussion (${item.comments.length})</div>
    <form class="composer" data-form="new-comment" data-item="${item.id}">
      <span class="avatar sm" style="background:${uById('you').color}">Y</span>
      <div class="composer-field">
        <textarea name="text" placeholder="Ask a question or share your thoughts..." rows="2"></textarea>
        <button class="btn btn-outline btn-sm send-btn" type="submit">${icon('send')}Post</button>
      </div>
    </form>
    <div style="margin-top:18px;">
      ${item.comments.length ? item.comments.map(c => commentHTML(c, item.id)).join('') : emptyState('No comments yet', 'Start the conversation about this item.', 'comment')}
    </div>
  `;
        }

        function commentHTML(c, itemId) {
            const a = uById(c.authorId);
            const replies = c.replies || [];
            return `<div class="comment">
    <span class="avatar sm" style="background:${a.color}">${a.name[0]}</span>
    <div class="bubble">
      <div class="cname">${a.name} <span style="color:var(--ink-soft); font-weight:400;">@${a.handle}</span></div>
      <div class="ctext">${c.text}</div>
      <div class="comment-actions">
        <button class="reply-link" data-action="toggle-reply" data-id="${c.id}">${icon('reply')}Reply</button>
      </div>
      ${replies.length ? `<div class="replies">${replies.map(r => {
                const ra = uById(r.authorId);
                return `<div class="comment"><span class="avatar sm" style="background:${ra.color}">${ra.name[0]}</span><div class="bubble"><div class="cname">${ra.name} <span style="color:var(--ink-soft); font-weight:400;">@${ra.handle}</span></div><div class="ctext">${r.text}</div></div></div>`;
            }).join('')}</div>` : ''}
      <form class="reply-form" id="reply-form-${c.id}" data-form="new-reply" data-item="${itemId}" data-comment="${c.id}">
        <span class="avatar sm" style="background:${uById('you').color}">Y</span>
        <div class="reply-field">
          <textarea name="text" placeholder="Reply to ${a.name}..." rows="1"></textarea>
          <button class="btn btn-outline btn-sm send-btn" type="submit">${icon('send')}</button>
        </div>
      </form>
    </div>
  </div>`;
        }

        function followBtn(userId) {
            const following = FOLLOWING.has(userId);
            return `<button class="btn ${following ? 'btn-outline' : 'btn-primary'} btn-sm" data-action="toggle-follow" data-id="${userId}">${following ? 'Following' : 'Follow'}</button>`;
        }

        function viewProfile(id) {
            const u = uById(id);
            if (!u) return emptyState('User not found', '');
            const posts = ITEMS.filter(i => i.authorId === id).sort((a, b) => b.id.localeCompare(a.id));
            const boards = BOARDS.filter(b => b.ownerId === id);
            const liked = ITEMS.filter(i => i.likedByMe).sort((a, b) => b.id.localeCompare(a.id));
            const tab = route.params.tab || 'posts';
            const isYou = id === 'you';
            return `
    <div class="profile-head">
      <span class="avatar lg" style="background:${u.color}">${u.name[0]}</span>
      <div style="flex:1; min-width:200px;">
        <h1 style="font-size:22px;">${u.name}</h1>
        <div style="color:var(--ink-soft); font-size:13.5px;">@${u.handle}</div>
        <p style="margin-top:6px; font-size:13.5px; max-width:480px;">${u.bio}</p>
        <div class="profile-stats">
          <span><b>${posts.length}</b> uploads</span>
          <span><b>${boards.length}</b> collections</span>
          <span><b>${120 + posts.length * 7}</b> followers</span>
        </div>
      </div>
      ${isYou ? '' : followBtn(id)}
    </div>
    <div class="tabs">
      <a href="#" class="tab ${tab === 'posts' ? 'active' : ''}" data-action="go" data-view="profile" data-id="${id}" data-tab="posts">Uploads</a>
      <a href="#" class="tab ${tab === 'collections' ? 'active' : ''}" data-action="go" data-view="profile" data-id="${id}" data-tab="collections">Collections</a>
      <a href="#" class="tab ${tab === 'liked' ? 'active' : ''}" data-action="go" data-view="profile" data-id="${id}" data-tab="liked">Liked</a>
    </div>
    ${tab === 'posts'
                    ? (posts.length ? feedGrid(posts) : emptyState('No uploads yet', isYou ? 'Upload your first item to get started.' : `${u.name} hasn't posted anything yet.`, 'image'))
                    : tab === 'collections'
                        ? (boards.length ? `<div class="board-grid">${boards.map(boardCard).join('')}</div>` : emptyState('No collections yet', '', 'layers'))
                        : (isYou
                            ? (liked.length ? feedGrid(liked) : emptyState('No liked items yet', 'Items you like will show up here.', 'heart'))
                            : emptyState('Liked items are private', `Only ${u.name} can see what they've liked.`, 'heart'))}
  `;
        }

        function viewSearch(q) {
            q = (q || '').toLowerCase().trim();
            const items = ITEMS.filter(i => i.title.toLowerCase().includes(q) || i.tags.some(t => t.toLowerCase().includes(q)) || uById(i.authorId).handle.toLowerCase().includes(q));
            return `
    <div class="page-head"><div><div class="page-title">Results for "${route.params.q}"</div><div class="page-sub">${items.length} item${items.length === 1 ? '' : 's'} found</div></div></div>
    ${feedGrid(items)}
  `;
        }

        /* ============================ MODALS ============================ */
        function openModal(html) {
            document.getElementById('modalRoot').innerHTML = `<div class="modal-overlay" data-action="close-modal">${html}</div>`;
            document.getElementById('modalRoot').querySelector('.modal').addEventListener('click', e => {
                if (!e.target.closest('.close-x')) e.stopPropagation();
            });
        }
        function closeModal() { document.getElementById('modalRoot').innerHTML = ''; pendingUpload = null; }

        function uploadModal() {
            const chips = CATEGORIES.map(c => `<button type="button" class="chip" data-chip="${c.name}">${c.name}</button>`).join('');
            openModal(`
    <div class="modal">
      <div class="modal-head"><h2>Upload an item</h2><button class="close-x" data-action="close-modal">${icon('x')}</button></div>
      <form data-form="upload-item">
        <div class="field">
          <label>Photo or short video</label>
          <div class="dropzone" id="dropzone">
            ${icon('upload')}
            <div>Click to choose a file, or drag it here</div>
            <div style="font-size:11.5px; margin-top:2px;">JPG, PNG, MP4 — under 25MB</div>
          </div>
          <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
          <div id="previewSlot"></div>
        </div>
        <div class="field">
          <label>Title</label>
          <input type="text" name="title" placeholder="e.g. Walnut cable tray, matte black hooks" required>
        </div>
        <div class="field">
          <label>Price (USD)</label>
          <input type="number" name="price" min="0" step="1" placeholder="0" required>
        </div>
        <div class="field">
          <label>Tags</label>
          <div class="tag-search">
            ${icon('search')}
            <input type="text" id="tagSearchInput" placeholder="Search for a tag..." autocomplete="off">
          </div>
          <div class="chip-select" id="chipSelect">${chips}</div>
          <div id="noTagMatch" class="side-empty" style="display:none; padding-left:0;">No tags match your search.</div>
        </div>
        <div class="field">
          <label>External link (optional)</label>
          <input type="text" name="link" placeholder="e.g. https://www.instagram.com/..." required>
        </div>
        <div class="field">
          <label>Description (optional)</label>
          <textarea name="desc" placeholder="What makes this piece worth adding to a desk setup?"></textarea>
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center; padding:11px;">Post to Deskstack</button>
      </form>
    </div>
  `);
            const dz = document.getElementById('dropzone');
            const fi = document.getElementById('fileInput');
            dz.addEventListener('click', () => fi.click());
            dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor = 'var(--accent)'; });
            dz.addEventListener('dragleave', () => { dz.style.borderColor = ''; });
            dz.addEventListener('drop', e => {
                e.preventDefault(); dz.style.borderColor = '';
                if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
            });
            fi.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
            document.getElementById('chipSelect').addEventListener('click', e => {
                const chip = e.target.closest('.chip');
                if (chip) chip.classList.toggle('on');
            });
            const tagSearchInput = document.getElementById('tagSearchInput');
            const chipEls = [...document.querySelectorAll('#chipSelect .chip')];
            tagSearchInput.addEventListener('input', () => {
                const q = tagSearchInput.value.toLowerCase().trim();
                let anyVisible = false;
                chipEls.forEach(c => {
                    const match = c.dataset.chip.toLowerCase().includes(q);
                    c.style.display = match ? '' : 'none';
                    if (match) anyVisible = true;
                });
                document.getElementById('noTagMatch').style.display = anyVisible ? 'none' : 'block';
            });
        }

        function handleFile(file) {
            const isVideo = file.type.startsWith('video');
            const reader = new FileReader();
            reader.onload = ev => {
                pendingUpload = { dataUrl: ev.target.result, type: isVideo ? 'video' : 'image' };
                document.getElementById('previewSlot').innerHTML = `
      <div class="preview-media">
        ${isVideo ? `<video src="${pendingUpload.dataUrl}" muted autoplay loop playsinline></video>` : `<img src="${pendingUpload.dataUrl}">`}
      </div>`;
            };
            reader.readAsDataURL(file);
        }

        function saveModal(itemId) {
            const mine = BOARDS.filter(b => b.ownerId === 'you');
            openModal(`
    <div class="modal">
      <div class="modal-head"><h2>Save to collection</h2><button class="close-x" data-action="close-modal">${icon('x')}</button></div>
      <div>
        ${mine.map(b => `
          <label class="board-row">
            <input type="checkbox" data-board-toggle="${b.id}" ${b.itemIds.includes(itemId) ? 'checked' : ''}>
            <div class="board-thumb" style="background:${catColor((ITEMS.find(i => i.id === b.itemIds[0]) || {}).category) || 'var(--line)'}"></div>
            <div style="flex:1;"><b style="font-size:13.5px;">${b.name}</b><div style="font-size:11.5px; color:var(--ink-soft);">${b.itemIds.length} items</div></div>
          </label>`).join('') || `<p style="color:var(--ink-soft); font-size:13.5px; padding:8px 0 16px;">You don't have any collections yet.</p>`}
      </div>
      <form data-form="quick-board" style="display:flex; gap:8px; margin-top:12px;">
        <input type="text" name="name" placeholder="New collection name" style="flex:1; padding:8px 11px; border-radius:8px; border:1px solid var(--line-strong); font-family:inherit;">
        <button class="btn btn-outline btn-sm" type="submit">${icon('plus')}Create</button>
      </form>
    </div>
  `);
            document.getElementById('modalRoot').querySelectorAll('[data-board-toggle]').forEach(cb => {
                cb.addEventListener('change', () => {
                    const b = BOARDS.find(x => x.id === cb.dataset.boardToggle);
                    if (cb.checked) { if (!b.itemIds.includes(itemId)) b.itemIds.push(itemId); }
                    else { b.itemIds = b.itemIds.filter(x => x !== itemId); }
                    recomputeSaved();
                    renderApp();
                });
            });
        }

        function newBoardModal() {
            openModal(`
    <div class="modal">
      <div class="modal-head"><h2>New collection</h2><button class="close-x" data-action="close-modal">${icon('x')}</button></div>
      <form data-form="create-board">
        <div class="field"><label>Name</label><input type="text" name="name" placeholder="e.g. Home office refresh" required autofocus></div>
        <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center; padding:11px;">Create collection</button>
      </form>
    </div>
  `);
        }

        /* ============================ TOAST ============================ */
        function toast(msg) {
            const el = document.getElementById('toastRoot');
            el.innerHTML = `<div class="toast">${msg}</div>`;
            setTimeout(() => { if (el.firstChild) el.innerHTML = ''; }, 2200);
        }

        /* ============================ EVENT BINDING ============================ */
        function bindDynamic() {
            // nothing per-render needed beyond global delegation (set up once below)
        }

        document.addEventListener('click', e => {
            const closeM = e.target.closest('[data-action="close-modal"]');
            if (closeM) { closeModal(); return; }

            const goEl = e.target.closest('[data-action="go"]');
            if (goEl) {
                e.preventDefault();
                go(goEl.dataset.view, { id: goEl.dataset.id, tab: goEl.dataset.tab });
                return;
            }

            const upEl = e.target.closest('[data-action="open-upload"]');
            if (upEl) { uploadModal(); return; }

            const saveEl = e.target.closest('[data-action="save-item"]');
            if (saveEl) {
                e.preventDefault(); e.stopPropagation();
                if (BOARDS.filter(b => b.ownerId === 'you').length === 0) {
                    const b = { id: nextId('b'), name: 'Saved', ownerId: 'you', itemIds: [] };
                    BOARDS.push(b);
                }
                saveModal(saveEl.dataset.id);
                return;
            }

            const likeEl = e.target.closest('[data-action="like"]');
            if (likeEl) {
                e.preventDefault(); e.stopPropagation();
                const item = ITEMS.find(i => i.id === likeEl.dataset.id);
                if (item) { item.likedByMe = !item.likedByMe; item.likes += item.likedByMe ? 1 : -1; renderApp(); }
                return;
            }

            const followEl = e.target.closest('[data-action="toggle-follow"]');
            if (followEl) {
                e.preventDefault(); e.stopPropagation();
                const id = followEl.dataset.id;
                if (FOLLOWING.has(id)) { FOLLOWING.delete(id); } else { FOLLOWING.add(id); toast(`Following @${uById(id).handle}`); }
                renderApp();
                return;
            }

            const commEl = e.target.closest('[data-action="toggle-community"]');
            if (commEl) {
                e.preventDefault();
                const tag = commEl.dataset.id;
                if (FOLLOWED_TAGS.has(tag)) { FOLLOWED_TAGS.delete(tag); PINNED_TAGS.delete(tag); }
                else { FOLLOWED_TAGS.add(tag); toast(`Joined ${tag}`); }
                renderApp();
                return;
            }

            const pinEl = e.target.closest('[data-action="toggle-pin"]');
            if (pinEl) {
                e.preventDefault();
                const tag = pinEl.dataset.id;
                if (PINNED_TAGS.has(tag)) { PINNED_TAGS.delete(tag); } else { PINNED_TAGS.add(tag); toast(`Pinned ${tag}`); }
                renderApp();
                return;
            }

            const replyToggle = e.target.closest('[data-action="toggle-reply"]');
            if (replyToggle) {
                e.preventDefault(); e.stopPropagation();
                const form = document.getElementById('reply-form-' + replyToggle.dataset.id);
                if (form) { form.classList.toggle('open'); const ta = form.querySelector('textarea'); if (form.classList.contains('open')) ta.focus(); }
                return;
            }

            const shopEl = e.target.closest('[data-action="shop"]');
            if (shopEl) { e.preventDefault(); toast('This is a demo — no external checkout is connected.'); return; }

            const newBoardEl = e.target.closest('[data-action="new-board"]');
            if (newBoardEl) { newBoardModal(); return; }
        });

        document.addEventListener('submit', e => {
            const form = e.target.closest('[data-form]');
            if (!form) return;
            e.preventDefault();
            const type = form.dataset.form;
            const data = new FormData(form);

            if (type === 'search') {
                const q = data.get('q');
                if (q && q.trim()) go('search', { q: q.trim() });
                return;
            }

            if (type === 'new-comment') {
                const text = data.get('text');
                if (!text || !text.trim()) return;
                const item = ITEMS.find(i => i.id === form.dataset.item);
                item.comments.push({ id: nextId('c'), authorId: 'you', text: text.trim() });
                renderApp();
                return;
            }

            if (type === 'new-reply') {
                const text = data.get('text');
                if (!text || !text.trim()) return;
                const item = ITEMS.find(i => i.id === form.dataset.item);
                const comment = item.comments.find(c => c.id === form.dataset.comment);
                if (!comment.replies) comment.replies = [];
                comment.replies.push({ id: nextId('r'), authorId: 'you', text: text.trim() });
                renderApp();
                return;
            }

            if (type === 'new-post') {
                const text = data.get('text');
                if (!text || !text.trim()) return;
                const tag = form.dataset.tag;
                COMMUNITY_POSTS[tag].unshift({ id: nextId('p'), authorId: 'you', title: '', text: text.trim(), replies: [] });
                renderApp();
                return;
            }

            if (type === 'create-board') {
                const name = data.get('name');
                if (!name || !name.trim()) return;
                BOARDS.push({ id: nextId('b'), name: name.trim(), ownerId: 'you', itemIds: [] });
                closeModal();
                toast('Collection created');
                renderApp();
                return;
            }

            if (type === 'quick-board') {
                const name = data.get('name');
                if (!name || !name.trim()) return;
                BOARDS.push({ id: nextId('b'), name: name.trim(), ownerId: 'you', itemIds: [] });
                form.reset();
                renderApp();
                // reopen save modal state refreshed
                return;
            }

            if (type === 'upload-item') {
                const title = data.get('title');
                const price = Number(data.get('price')) || 0;
                const desc = data.get('desc');
                const link = data.get('link');
                const chosenTags = [...document.querySelectorAll('#chipSelect .chip.on')].map(c => c.dataset.chip);
                if (!title || !title.trim()) { toast('Give your item a title first'); return; }
                if (chosenTags.length === 0) { toast('Pick at least one tag'); return; }
                const item = {
                    id: nextId('i'),
                    title: title.trim(),
                    price,
                    category: chosenTags[0],
                    tags: chosenTags,
                    type: pendingUpload ? pendingUpload.type : 'image',
                    media: pendingUpload ? pendingUpload.dataUrl : null,
                    authorId: 'you',
                    likes: 0,
                    likedByMe: false,
                    comments: [],
                    desc: desc || '',
                    link: link && link.trim() ? link.trim() : ''
                };
                ITEMS.unshift(item);
                closeModal();
                toast('Posted to Deskstack');
                go('item', { id: item.id });
                return;
            }
        });

        /* ============================ INIT ============================ */
        renderApp();
    </script>
</body>

</html>
